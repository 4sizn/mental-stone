name: mental_stone
description: "Mental Stone — emotion journaling app (iOS + Android)."
publish_to: "none"
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ^3.11.5
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State + routing
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Workspace packages
  mental_stone_ui:
    path: ../../packages/mental_stone_ui
  mental_stone_core:
    path: ../../packages/mental_stone_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: HankenGrotesk
      fonts:
        # Variable font (weight axis Thin..Black); Flutter maps FontWeight
        # w400/w500/w600/w700 onto the `wght` axis.
        - asset: assets/fonts/HankenGrotesk.ttf
